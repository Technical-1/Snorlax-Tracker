<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .og-card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(160deg,#0d0b1e,#150a2e 50%,#091520);
      font-family: 'Trebuchet MS', sans-serif;
      color: #e2e8f0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 56px;
      padding: 70px 80px;
    }
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 35% 50%, #000 25%, transparent 75%);
    }
    .glow {
      position: absolute;
      width: 820px; height: 820px;
      top: -150px; left: -260px;
      background: radial-gradient(circle, rgba(251,191,36,0.16), transparent 60%);
      pointer-events: none;
    }
    .art {
      flex: 0 0 auto;
      width: 420px;
      height: 420px;
      object-fit: contain;
      filter: drop-shadow(0 22px 44px rgba(0,0,0,0.6));
      position: relative;
      z-index: 1;
    }
    .copy { position: relative; z-index: 1; display: flex; flex-direction: column; }
    h1 {
      font-size: 86px;
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(90deg,#fbbf24,#fde68a,#f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { margin-top: 20px; font-size: 27px; color: #94a3b8; letter-spacing: 0.02em; }
    .tags { margin-top: 38px; display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
    .tag {
      padding: 11px 22px;
      border-radius: 999px;
      border: 1px solid rgba(251,191,36,0.35);
      background: rgba(251,191,36,0.10);
      color: #fbbf24;
      font-size: 21px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <div class="grid"></div>
    <div class="glow"></div>
    <img class="art" src="snorlax.webp" alt="Snorlax">
    <div class="copy">
      <h1>Snorlax<br>Master Checklist</h1>
      <div class="tagline">Every card · Every language · Every variant</div>
      <div class="tags">
        <div class="tag">182 cards</div>
        <div class="tag">Live prices</div>
        <div class="tag">Owned tracker</div>
        <div class="tag">Export &amp; print</div>
      </div>
    </div>
  </div>
</body>
</html>
