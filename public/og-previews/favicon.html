<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
    .favicon {
      width: 512px;
      height: 512px;
      background: linear-gradient(150deg,#1e1b4b,#0d0b1e 55%,#091520);
      box-shadow: inset 0 0 0 16px rgba(251,191,36,0.9);
      border-radius: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .glyph {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.55));
    }
  </style>
</head>
<body>
  <div class="favicon">
    <img class="glyph" src="snorlax.webp" alt="Snorlax">
  </div>
</body>
</html>
