<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
    .favicon {
      width: 512px;
      height: 512px;
      background: linear-gradient(150deg,#1e1b4b,#0d0b1e 55%,#091520);
      box-shadow: inset 0 0 0 16px rgba(251,191,36,0.9);
      border-radius: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glyph {
      font-size: 300px;
      line-height: 1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.55));
    }
  </style>
</head>
<body>
  <div class="favicon">
    <div class="glyph">😴</div>
  </div>
</body>
</html>
